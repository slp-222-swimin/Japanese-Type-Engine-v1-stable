<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JPTE - High-Performance Japanese Typing Engine</title>
  <meta name="description"
    content="JPTE (Japanese Type Engine) - A graph-based JavaScript library for building next-generation Japanese typing experiences. Handles complex romaji paths, sokuon, and statistics with high performance.">
  <meta name="keywords"
    content="Japanese typing, romaji engine, JavaScript, typing game, typing library, Web typing, graph theory, DAG">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://github.com/slp-222-swimin/Japanese-Type-Engine-v1-stable">
  <meta property="og:title" content="JPTE - High-Performance Japanese Typing Engine">
  <meta property="og:description"
    content="Next-gen Japanese typing logic core. Flexible romaji paths, professional stats, and smooth GUI support.">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="JPTE - High-Performance Japanese Typing Engine">
  <meta property="twitter:description" content="Build the best Japanese typing experience with JPTE Graph-based logic.">

  <!-- JSON-LD for Search Engines and AI Assistants -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "JPTE (Japanese Type Engine)",
    "operatingSystem": "Web",
    "applicationCategory": "DeveloperApplication",
    "description": "High-performance Japanese typing logic library for JavaScript. Uses Directed Acyclic Graphs (DAG) to resolve complex romaji input paths.",
    "softwareVersion": "1.0.0",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>

  <link rel="stylesheet" href="./index.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="app-container">
    <header>
      <div class="brand">JPTE<span class="version">v1</span></div>
      <div class="stats-panel">
        <div class="stat-box">
          <span class="stat-label">KPM</span>
          <span class="stat-value" id="ui-kpm">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Accuracy</span>
          <span class="stat-value" id="ui-accuracy">0.0%</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Combo</span>
          <span class="stat-value" id="ui-combo">0</span>
        </div>
      </div>
    </header>

    <main class="typing-area" id="typing-area">
      <div class="instructions" id="instructions">Press Space to Start</div>

      <div class="game-content hidden" id="game-content">
        <div class="sentence" id="sentence">昨日、東京へ行った。</div>
        <div class="furigana" id="furigana">きのうとうきょうへいった</div>

        <div class="romaji-display" id="romaji-display">
          <span class="typed" id="typed-romaji"></span><span class="expected" id="expected-romaji"></span>
        </div>

        <div class="progress-bar-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>
    </main>

    <div class="effect-layer" id="effect-layer"></div>
  </div>

  <script type="module" src="./index.js"></script>
</body>

</html>
