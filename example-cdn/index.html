<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JPTE - High-Performance Japanese Typing Engine (CDN Demo)</title>
  <meta name="description" content="JPTE (Japanese Type Engine) - A graph-based JavaScript library for building next-generation Japanese typing experiences. This demo uses the CDN version of the library.">
  <meta name="keywords" content="Japanese typing, romaji engine, JavaScript, typing game, CDN library, Web typing">
  
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "JPTE (Japanese Type Engine)",
    "operatingSystem": "Web",
    "applicationCategory": "DeveloperApplication",
    "description": "High-performance Japanese typing logic library for JavaScript.",
    "softwareVersion": "1.0.0"
  }
  </script>

  <link rel="stylesheet" href="./index.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header>
      <div class="brand">JPTE<span class="version">v1</span></div>
      <div class="stats-panel">
        <div class="stat-box">
          <span class="stat-label">KPM</span>
          <span class="stat-value" id="ui-kpm">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Accuracy</span>
          <span class="stat-value" id="ui-accuracy">0.0%</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Combo</span>
          <span class="stat-value" id="ui-combo">0</span>
        </div>
      </div>
    </header>

    <main class="typing-area" id="typing-area">
      <div class="instructions" id="instructions">Press Space to Start</div>
      
      <div class="game-content hidden" id="game-content">
        <div class="sentence" id="sentence">昨日、東京へ行った。</div>
        <div class="furigana" id="furigana">きのうとうきょうへいった</div>
        
        <div class="romaji-display" id="romaji-display">
          <span class="typed" id="typed-romaji"></span><span class="expected" id="expected-romaji"></span>
        </div>
        
        <div class="progress-bar-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>
    </main>

    <div class="effect-layer" id="effect-layer"></div>
  </div>

  <script type="module" src="./index.js"></script>
</body>
</html>
